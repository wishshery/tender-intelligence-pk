# Render.com deployment configuration
# https://render.com/docs/blueprint-spec

services:
  # ── FastAPI Backend ────────────────────────────────────────
  - type: web
    name: tenderiq-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: tenderiq-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: tenderiq-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: tenderiq-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: tenderiq-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false   # set manually in Render dashboard
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false   # set to your Vercel/frontend URL

  # ── Celery Worker ──────────────────────────────────────────
  - type: worker
    name: tenderiq-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tenderiq-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: tenderiq-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: tenderiq-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: tenderiq-redis
          type: redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false

  # ── Celery Beat ────────────────────────────────────────────
  - type: worker
    name: tenderiq-beat
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.workers.celery_app beat --loglevel=info
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tenderiq-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: tenderiq-redis
          type: redis
          property: connectionString

  # ── Next.js Frontend ───────────────────────────────────────
  - type: web
    name: tenderiq-frontend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    rootDir: frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: tenderiq-api
          type: web
          property: host
          prepend: "https://"
          append: "/api/v1"
      - key: NEXT_PUBLIC_STRIPE_PK
        sync: false

databases:
  - name: tenderiq-db
    databaseName: tenderiq_db
    user: tenderiq
    plan: starter

  - name: tenderiq-redis
    type: redis
    plan: starter
    ipAllowList: []
