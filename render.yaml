# Render.com deployment configuration
# https://render.com/docs/blueprint-spec

services:
  # ── Redis (Key Value) ───────────────────────────────────────
  - type: redis
    name: tenderiq-redis
    plan: free
    ipAllowList: []

  # ── FastAPI Backend ────────────────────────────────────────
  - type: web
    name: tenderiq-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: tenderiq-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: tenderiq-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: tenderiq-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: tenderiq-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://tender-intelligence-pk.vercel.app,https://tender-intelligence-pk-git-main-wishsherys-projects.vercel.app

databases:
  - name: tenderiq-db
    databaseName: tenderiq_db
    user: tenderiq
    plan: free
