name: TenderIQ CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests ─────────────────────────────────────────
  backend-test:
    name: Backend (Python FastAPI)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tenderiq
          POSTGRES_PASSWORD: password
          POSTGRES_DB: tenderiq_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Run linting (flake8)
        working-directory: ./backend
        run: |
          pip install flake8
          flake8 app/ --max-line-length=120 --ignore=E501,W503 || true

      - name: Check imports (no circular deps)
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://tenderiq:password@localhost:5432/tenderiq_test
          SECRET_KEY: test-secret-key-minimum-32-characters-long
          ANTHROPIC_API_KEY: sk-test
          REDIS_URL: redis://localhost:6379/0
        run: python -c "from app.main import app; print('✅ App imports OK')"

  # ── Frontend Build ────────────────────────────────────────
  frontend-build:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --prefer-offline || npm install

      - name: Type check
        working-directory: ./frontend
        run: npx tsc --noEmit || true

      - name: Build
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.tenderiq.pk/api/v1
          NEXT_PUBLIC_STRIPE_PK: pk_test_placeholder
        run: npm run build

  # ── Docker Build Check ─────────────────────────────────────
  docker-check:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose
        run: docker compose config --quiet

  # ── Deploy to Render (main branch only) ───────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy (API)
        if: vars.RENDER_DEPLOY_HOOK_API != ''
        run: |
          curl -s "${{ vars.RENDER_DEPLOY_HOOK_API }}" | jq .

      - name: Trigger Render Deploy (Frontend)
        if: vars.RENDER_DEPLOY_HOOK_FRONTEND != ''
        run: |
          curl -s "${{ vars.RENDER_DEPLOY_HOOK_FRONTEND }}" | jq .

      - name: Deployment summary
        run: |
          echo "🚀 TenderIQ Pakistan deployment triggered"
          echo "   API:      https://tenderiq-api.onrender.com"
          echo "   Frontend: https://tenderiq-frontend.onrender.com"
